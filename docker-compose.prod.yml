version: '3.8'

services:
  mongodb:
    image: mongo:latest
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - sentinel_network

  redis:
    image: redis:alpine
    restart: always
    networks:
      - sentinel_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/sentinel
      - REDIS_URL=redis://redis:6379
      - PORT=5000
    depends_on:
      - mongodb
      - redis
    networks:
      - sentinel_network
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: always
    depends_on:
      - backend
    networks:
      - sentinel_network
    ports:
      - "80:80"

networks:
  sentinel_network:
    driver: bridge

volumes:
  mongo_data:
