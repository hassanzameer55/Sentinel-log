version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: sentinel-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - sentinel-network

  redis:
    image: redis:latest
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - sentinel-network

networks:
  sentinel-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
